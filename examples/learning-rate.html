<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GD Simulator v14.0: Floating Iteration Counter</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 900px; }
        h2 { text-align: center; color: #1a73e8; margin-top: 0; }
        canvas { border: 1px solid #dcdfe3; background: #fff; border-radius: 12px; width: 100%; height: 450px; display: block; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin: 20px 0; padding: 15px; background: #f8f9fa; border-radius: 12px; }
        .full-width { grid-column: span 3; }
        label { font-size: 0.8rem; color: #5f6368; font-weight: 600; margin-bottom: 4px; display: block; }
        select, input[type="range"] { width: 100%; cursor: pointer; }
        .slider-group { background: white; padding: 10px; border-radius: 8px; border: 1px solid #e8eaed; }
        .btn-group { grid-column: span 3; display: flex; gap: 10px; margin-top: 5px; }
        button { flex: 1; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        #run-btn { background: #1a73e8; }
        #stop-btn { background: #dadce0; color: #3c4043; }
        .status-panel { display: flex; justify-content: center; background: #202124; color: #81c995; padding: 12px; border-radius: 10px; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <h2 id="func-title">GD Visual Counter Simulator</h2>
    
    <canvas id="canvas"></canvas>

    <div class="controls">
        <div class="full-width">
            <label>알고리즘: <span id="algo-name" style="color:#1a73e8">Standard SGD</span></label>
            <input type="range" id="algo-toggle" min="0" max="1" step="1" value="0" onchange="updateUI()">
        </div>
        
        <div class="slider-group">
            <label>함수 시나리오</label>
            <select id="func-select" onchange="changeFunction()">
                <option value="mse">1. Basic MSE (Standard)</option>
                <option value="local_min">2. Asymmetric (좌:Local, 우:Global Deep)</option>
                <option value="saddle">3. Extreme Plateau (정체 후 하강)</option>
            </select>
        </div>

        <div class="slider-group">
            <label>학습률 (η): <span id="lr-val">0.30</span></label>
            <input type="range" id="lr" min="0.01" max="1.1" step="0.01" value="0.30">
        </div>

        <div class="slider-group">
            <label>시작 위치 (w): <span id="start-val">-10</span></label>
            <input type="range" id="start-w" min="-10" max="10" step="0.1" value="-10">
        </div>

        <div class="btn-group">
            <button id="run-btn" onclick="runSimulation()">시뮬레이션 시작</button>
            <button id="stop-btn" onclick="stopSimulation()">초기화</button>
        </div>
    </div>

    <div class="status-panel">
        <div id="state-msg">상태: 대기 중</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const WIDTH = 900, HEIGHT = 450;
    canvas.width = WIDTH; canvas.height = HEIGHT;

    const functions = {
        mse: {
            fn: (w) => w * w,
            grad: (w) => 2 * w,
            xRange: [-10, 10],
            defaultW: -10,
            title: "1. Basic MSE (w²)"
        },
        local_min: {
            // 비대칭성 강화 및 좌표계 확장
            fn: (w) => 0.01*Math.pow(w,4) - 0.05*Math.pow(w,3) - 1.5*Math.pow(w,2) + 2*w + 100,
            grad: (w) => 0.04*Math.pow(w,3) - 0.15*Math.pow(w,2) - 3*w + 2,
            xRange: [-15, 18],
            defaultW: -12,
            title: "2. Asymmetric (Local vs Global)"
        },
        saddle: {
            // 초장거리 평원 (Flat Plateau)
            fn: (w) => -35 * Math.tanh(0.15 * (w - 10)) + 0.08 * Math.pow(w, 2) + 40,
            grad: (w) => -5.25 * (1 - Math.pow(Math.tanh(0.15 * (w - 10)), 2)) + 0.16 * w,
            xRange: [-10, 28],
            defaultW: -8,
            title: "3. Extreme Wide Plateau"
        }
    };

    let currentConfig = functions.mse;
    let history = [];
    let currentW, currentLR, animationFrame, isRunning = false;
    let iterCount = 0, G = 0, yMin, yMax;

    function calculateYRange() {
        let ys = [];
        for (let x = currentConfig.xRange[0]; x <= currentConfig.xRange[1]; x += 0.1) {
            ys.push(currentConfig.fn(x));
        }
        yMin = Math.min(...ys); yMax = Math.max(...ys);
        let padding = (yMax - yMin) * 0.15;
        yMin -= padding; yMax += padding;
    }

    function scaleX(w) { return (w - currentConfig.xRange[0]) / (currentConfig.xRange[1] - currentConfig.xRange[0]) * WIDTH; }
    function scaleY(l) { return HEIGHT - (l - yMin) / (yMax - yMin) * HEIGHT; }

    function draw() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);
        // Grid
        ctx.beginPath(); ctx.strokeStyle = '#f1f3f4'; ctx.lineWidth = 1;
        for(let x=0; x<=WIDTH; x+=WIDTH/20) { ctx.moveTo(x,0); ctx.lineTo(x,HEIGHT); }
        for(let y=0; y<=HEIGHT; y+=HEIGHT/10) { ctx.moveTo(0,y); ctx.lineTo(WIDTH,y); }
        ctx.stroke();

        // Curve
        ctx.beginPath(); ctx.strokeStyle = '#3c4043'; ctx.lineWidth = 4;
        const [xMin, xMax] = currentConfig.xRange;
        for(let x = xMin; x <= xMax; x += 0.1) {
            ctx.lineTo(scaleX(x), scaleY(currentConfig.fn(x)));
        }
        ctx.stroke();

        // Path
        if(history.length > 1) {
            ctx.beginPath(); ctx.strokeStyle = '#ea4335'; ctx.lineWidth = 2;
            ctx.setLineDash([5, 4]);
            history.forEach((p, i) => { i === 0 ? ctx.moveTo(scaleX(p.w), scaleY(p.l)) : ctx.lineTo(scaleX(p.w), scaleY(p.l)); });
            ctx.stroke(); ctx.setLineDash([]);
        }

        // Current Point & Floating Counter
        if(history.length > 0) {
            let last = history[history.length-1];
            let sx = scaleX(last.w);
            let sy = scaleY(last.l);

            // Red Dot
            ctx.fillStyle = '#ea4335'; ctx.beginPath(); ctx.arc(sx, sy, 10, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.stroke();

            // Floating Iteration Label
            ctx.fillStyle = "#202124";
            ctx.font = "bold 14px Segoe UI, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText(`Step: ${iterCount}`, sx, sy - 20);
            ctx.font = "12px monospace";
            ctx.fillText(`w: ${last.w.toFixed(2)}`, sx, sy + 25);
        }
    }

    function runSimulation() {
        if(isRunning) return;
        isRunning = true;
        currentW = parseFloat(document.getElementById('start-w').value);
        currentLR = parseFloat(document.getElementById('lr').value);
        const isAdaptive = document.getElementById('algo-toggle').value === "1";
        history = []; iterCount = 0; G = 0;
        document.getElementById('state-msg').innerText = "상태: 최적화 중...";
        
        function step() {
            if(!isRunning) return;
            let loss = currentConfig.fn(currentW);
            let grad = currentConfig.grad(currentW);

            if(!isFinite(loss) || Math.abs(currentW) > currentConfig.xRange[1] * 2) {
                document.getElementById('state-msg').innerHTML = "<span style='color:#ea4335'>상태: 발산(Exploded)!</span>";
                isRunning = false; return;
            }

            history.push({w: currentW, l: loss});
            iterCount++;
            
            if(!isAdaptive) {
                currentW = currentW - currentLR * grad;
            } else {
                G = 0.9 * G + 0.1 * grad * grad;
                currentW = currentW - (currentLR / (Math.sqrt(G) + 1e-8)) * grad;
            }

            draw();
            
            if(Math.abs(grad) < 0.001 || iterCount >= 1000) {
                isRunning = false;
                document.getElementById('state-msg').innerText = "상태: 학습 완료";
            } else {
                animationFrame = setTimeout(() => requestAnimationFrame(step), 35);
            }
        }
        step();
    }

    function stopSimulation() { isRunning = false; clearTimeout(animationFrame); history = []; iterCount = 0; draw(); 
        document.getElementById('state-msg').innerText = "상태: 대기 중";
    }
    
    function changeFunction() { 
        currentConfig = functions[document.getElementById('func-select').value]; 
        document.getElementById('func-title').innerText = currentConfig.title;
        calculateYRange();
        const slider = document.getElementById('start-w');
        slider.min = currentConfig.xRange[0]; slider.max = currentConfig.xRange[1];
        slider.value = currentConfig.defaultW;
        document.getElementById('start-val').innerText = currentConfig.defaultW;
        stopSimulation(); 
    }
    
    function updateUI() {
        const isAdaptive = document.getElementById('algo-toggle').value === "1";
        document.getElementById('algo-name').innerText = isAdaptive ? "Adaptive LR (가변)" : "Standard SGD (고정)";
        document.getElementById('algo-name').style.color = isAdaptive ? "#1e8e3e" : "#1a73e8";
        stopSimulation();
    }

    document.getElementById('lr').oninput = function() { document.getElementById('lr-val').innerText = parseFloat(this.value).toFixed(2); };
    document.getElementById('start-w').oninput = function() { document.getElementById('start-val').innerText = this.value; };
    
    changeFunction();
</script>
</body>
</html>
